<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Prime Shine Reviews</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

header{
background:#0a6cff;
color:white;
padding:20px;
}

.review-box{
max-width:500px;
margin:auto;
padding:20px;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:12px 20px;
background:#ffd000;
border:none;
font-weight:bold;
}

.review{
background:white;
padding:12px;
margin-top:10px;
border-radius:8px;
}

a{
display:block;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h1>Prime Shine Reviews</h1>

</header>

<div class="review-box">

<h3>Leave a Review</h3>

<input id="name" placeholder="Your Name">
<textarea id="message" placeholder="Your Review"></textarea>

<button onclick="addReview()">Submit</button>

<h3>Customer Reviews</h3>

<div id="reviewList"></div>

<a href="index.html">⬅ Back to Home</a>

</div>

<script>

function loadReviews(){

let reviews = JSON.parse(localStorage.getItem("reviews")) || []

let list = document.getElementById("reviewList")

list.innerHTML=""

reviews.forEach(r =>{

list.innerHTML += `
<div class="review">
<b>${r.name}</b>
<p>${r.text}</p>
</div>
`

})

}

function addReview(){

let name = document.getElementById("name").value
let text = document.getElementById("message").value

if(name === "" || text === "") return

let reviews = JSON.parse(localStorage.getItem("reviews")) || []

reviews.push({name:name,text:text})

localStorage.setItem("reviews",JSON.stringify(reviews))

document.getElementById("name").value=""
document.getElementById("message").value=""

loadReviews()

}

loadReviews()

</script>

</body>

</html>
