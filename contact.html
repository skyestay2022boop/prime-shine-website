<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Request a Quote</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

form{
max-width:500px;
margin:auto;
padding:20px;
}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#ffd000;
border:none;
padding:12px 20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Request a Free Quote</h1>

<form action="mailto:YOUR_EMAIL" method="POST" enctype="text/plain">

<input type="text" name="Name" placeholder="Name" required>

<input type="tel" name="Phone" placeholder="Phone Number" required>

<textarea name="Job Details" placeholder="What would you like cleaned?" rows="5"></textarea>

<button type="submit">Send Quote</button>

</form>

<p>Or call 217-649-5659</p>

<a href="index.html">Back</a>

</body>
</html>
